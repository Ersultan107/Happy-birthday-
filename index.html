<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Donate Alert Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        body { background: #00ff00; /* Зеленка для OBS */ font-family: 'Montserrat', sans-serif; }
        
        #alert-container {
            display: none;
            width: 500px;
            margin: 100px auto;
            text-align: center;
            color: white;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.8);
        }

        .nickname { font-size: 45px; color: #00f2ff; text-transform: uppercase; margin-bottom: 5px; }
        .amount { font-size: 30px; color: #fff; margin-bottom: 20px; }
        .message { 
            font-family: 'Roboto', sans-serif;
            font-size: 24px; 
            background: rgba(0,0,0,0.7); 
            padding: 15px; 
            border-radius: 15px; 
            border-left: 5px solid #00f2ff;
        }
    </style>
</head>
<body>

<div id="alert-container">
    <div class="nickname" id="user_name">Ерсултан</div>
    <div class="amount" id="user_amount">500 ₸</div>
    <div class="message" id="user_msg">Удачи на стриме!</div>
</div>

<button onclick="simulateDonate('Ерсултан', '500', 'Удачи на стриме!')" style="padding: 10px 20px; cursor: pointer;">
    Тест: Донат от Ерсултана
</button>

<script>
    function simulateDonate(name, sum, comment) {
        const container = document.getElementById('alert-container');
        document.getElementById('user_name').innerText = name;
        document.getElementById('user_amount').innerText = sum + " ₸";
        document.getElementById('user_msg').innerText = comment;

        container.style.display = 'block';

        // Формируем фразу для озвучки
        const textToSay = `${name} скинул ${sum} тенге. ${comment}`;

        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(textToSay);
        
        // Настройки для более приятного голоса
        utterance.lang = 'ru-RU';
        utterance.pitch = 0.8; // Чуть ниже тон (более мужской)
        utterance.rate = 1.0;  // Нормальная скорость
        utterance.volume = 1;

        // Важно: Найти в системе мужской голос, если он есть
        const voices = synth.getVoices();
        const maleVoice = voices.find(v => v.name.includes('Pavel') || v.name.includes('Microsoft Dmitry'));
        if (maleVoice) utterance.voice = maleVoice;

        synth.speak(utterance);

        // Убираем через 7 секунд
        setTimeout(() => { container.style.display = 'none'; }, 7000);
    }
</script>
</body>
</html>
