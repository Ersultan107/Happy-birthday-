<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Donate Alert Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Roboto:wght@400&display=swap" rel="stylesheet">
    <style>
        /* Я убрал ядовитый зеленый, сделал его более мягким для теста, 
           но в OBS ты сам выберешь нужный фон */
        body { background: #00ff00; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        #alert-container {
            display: none;
            width: 450px;
            text-align: center;
            color: white;
            text-shadow: 4px 4px 10px rgba(0,0,0,0.9);
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .nickname { font-size: 50px; color: #00f2ff; text-transform: uppercase; margin: 0; }
        .amount { font-size: 35px; color: #fff; margin-bottom: 20px; }
        .message { 
            font-family: 'Roboto', sans-serif;
            font-size: 26px; 
            background: rgba(0,0,0,0.8); 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid #00f2ff;
            box-shadow: 0 0 20px rgba(0,242,255,0.5);
        }
    </style>
</head>
<body>

<div id="alert-container">
    <div class="nickname" id="user_name">Ерсултан</div>
    <div class="amount" id="user_amount">500 ₸</div>
    <div class="message" id="user_msg">Удачи на стриме!</div>
</div>

<button onclick="simulateDonate('Ерсултан', '500', 'Удачи на стриме!')" 
        style="position: absolute; top: 20px; left: 20px; padding: 15px; background: white; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;">
    ТЕСТ ДОНАТА
</button>

<script>
    function simulateDonate(name, sum, comment) {
        const container = document.getElementById('alert-container');
        document.getElementById('user_name').innerText = name;
        document.getElementById('user_amount').innerText = sum + " ₸";
        document.getElementById('user_msg').innerText = comment;

        container.style.display = 'block';

        // Вариант для чистого голоса: пишем "тенге" текстом
        const textToSay = name + " скинул " + sum + " тенге. " + comment;

        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(textToSay);
        
        utterance.lang = 'ru-RU';
        utterance.pitch = 0.9; 
        utterance.rate = 1.0; 

        // Ищем голос Google (он самый нормальный на Android и в Chrome)
        const voices = synth.getVoices();
        const googleVoice = voices.find(v => v.name.includes('Google') && v.lang.includes('ru'));
        
        if (googleVoice) {
            utterance.voice = googleVoice;
        }

        // Чтобы не было глюков на Android, сначала отменяем старую речь
        synth.cancel();
        synth.speak(utterance);

        setTimeout(() => { container.style.display = 'none'; }, 8000);
    }

    // Предзагрузка голосов для браузера
    window.speechSynthesis.getVoices();
</script>
</body>
</html>
