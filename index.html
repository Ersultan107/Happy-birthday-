<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Widget Alert</title>
    <style>
        body { background: transparent; font-family: sans-serif; overflow: hidden; }
        #alert-box {
            display: none;
            width: 400px;
            text-align: center;
            margin: 50px auto;
            animation: fadeInDown 0.5s;
        }
        .nickname { color: #ffcc00; font-size: 32px; font-weight: bold; text-shadow: 2px 2px #000; }
        .amount { color: #fff; font-size: 24px; text-shadow: 1px 1px #000; }
        .message { color: #fff; font-size: 20px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px; margin-top: 10px; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="alert-box">
    <div class="nickname" id="user">Иван</div>
    <div class="amount" id="sum">500 ₸</div>
    <div class="message" id="msg">Удачи на стриме!</div>
</div>

<button onclick="testAlert()" style="position:fixed; bottom:10px; right:10px;">Тест Доната</button>

<script>
    function testAlert() {
        const alertBox = document.getElementById('alert-box');
        const text = "Иван задонатил 500 тенге. Сообщение: Удачи на стриме!";
        
        // 1. Показываем визуально
        alertBox.style.display = 'block';

        // 2. Озвучка
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'ru-RU';
        speech.rate = 0.9; // Скорость чуть медленнее
        
        window.speechSynthesis.speak(speech);

        // 3. Прячем через 5 секунд
        setTimeout(() => { alertBox.style.display = 'none'; }, 6000);
    }
</script>
</body>
</html>
